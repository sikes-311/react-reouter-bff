services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - bff

  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DOWNSTREAM_SERVICE_A_BASE_URL=http://downstream-mock-a:8080
      - DOWNSTREAM_SERVICE_B_BASE_URL=http://downstream-mock-b:8080
    depends_on:
      - downstream-mock-a
      - downstream-mock-b

  downstream-mock-a:
    image: wiremock/wiremock:3.9.1
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock/service-a/mappings:/home/wiremock/mappings
      - ./wiremock/service-a/__files:/home/wiremock/__files
    command: --verbose --port 8080

  downstream-mock-b:
    image: wiremock/wiremock:3.9.1
    ports:
      - "8082:8080"
    volumes:
      - ./wiremock/service-b/mappings:/home/wiremock/mappings
      - ./wiremock/service-b/__files:/home/wiremock/__files
    command: --verbose --port 8080
