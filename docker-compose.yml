services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - bff

  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DOWNSTREAM_BASE_URL=http://downstream-mock:8080
    depends_on:
      - downstream-mock

  downstream-mock:
    image: wiremock/wiremock:3.9.1
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings
      - ./wiremock/__files:/home/wiremock/__files
    command: --verbose --port 8080
